<!DOCTYPE html>
<html>
<head>
<title>AI Marketing SaaS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { background:#0f172a; color:white; font-family:Arial; text-align:center;}
.box { background:white; color:black; padding:20px; border-radius:10px; max-width:500px; margin:auto;}
input,select { width:90%; padding:10px; margin:8px;}
button { padding:10px; background:green; color:white; border:none; margin:5px;}
.loader { border:5px solid #ccc; border-top:5px solid green; border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite;}
@keyframes spin {100%{transform:rotate(360deg)}}
</style>
</head>

<body>

<h1>🚀 AI Marketing Generator</h1>

<div class="box">

<h3>Signup</h3>
<input id="firstName" placeholder="First Name">
<input id="lastName" placeholder="Last Name">
<select id="gender">
<option>Male</option><option>Female</option>
</select>
<input id="dob" type="date">
<input id="username" placeholder="Username">
<input id="password" type="password">
<input id="confirmPassword" type="password">

<button onclick="signup()">Signup</button>
<p id="msg"></p>

<hr>

<h3>Login</h3>
<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password">
<button onclick="login()">Login</button>

<div id="app" style="display:none">

<h3>Welcome <span id="user"></span></h3>

<input id="product" placeholder="Product">
<input id="audience" placeholder="Audience">

<select id="platform">
<option>instagram</option>
<option>facebook ads</option>
<option>google ads</option>
<option>youtube shorts</option>
<option>youtube long</option>
<option>all</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="copyText()">Copy</button>
<button onclick="downloadPDF()">PDF</button>
<button onclick="loadHistory()">History</button>

<div id="result"></div>
<div id="history"></div>

</div>

</div>

<script>

let user = localStorage.getItem("user");
if(user) showApp(user);

async function signup(){
let data = {
first_name:firstName.value,
last_name:lastName.value,
gender:gender.value,
dob:dob.value,
username:username.value,
password:password.value,
confirm_password:confirmPassword.value
};

let res = await fetch("/signup",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
let d = await res.json();
msg.innerText = d.message || d.error;
}

async function login(){
let res = await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
username:loginUsername.value,
password:loginPassword.value
})});

let d = await res.json();

if(d.message){
localStorage.setItem("user", loginUsername.value);
showApp(loginUsername.value);
}else alert("Wrong login");
}

function showApp(u){
app.style.display="block";
user=u;
document.getElementById("user").innerText=u;
}

async function generate(){
result.innerHTML="<div class='loader'></div>";

let res = await fetch("/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
username:user,
product:product.value,
audience:audience.value,
platform:platform.value
})});

let d = await res.json();
result.innerText=d.campaign;
}

function copyText(){
navigator.clipboard.writeText(result.innerText);
alert("Copied");
}

function downloadPDF(){
html2pdf().from(result).save();
}

async function loadHistory(){
let res = await fetch("/history/"+user);
let d = await res.json();

let html="";
d.history.forEach(i=>{
html+=`<div><b>${i[0]}</b> (${i[1]})<br>${i[2]}</div><hr>`;
});

history.innerHTML=html;
}

</script>

</body>
</html>
