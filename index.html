<!DOCTYPE html>
<html>
<head>
    <title>AI Marketing SaaS</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .box {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            max-width: 420px;
            margin: auto;
        }

        input, select {
            width: 90%;
            padding: 12px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
            margin: 5px;
        }

        #result {
            margin-top: 20px;
            text-align: left;
            white-space: pre-wrap;
        }

        #history {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>

<body>

<h1>🚀 AI Marketing Generator</h1>

<div class="box">

    <!-- LOGIN -->
    <div id="auth">
        <input id="username" placeholder="Username" />
        <input id="password" type="password" placeholder="Password" />

        <button onclick="signup()">Signup</button>
        <button onclick="login()">Login</button>
    </div>

    <!-- APP -->
    <div id="app" style="display:none">

        <h3>Welcome <span id="userDisplay"></span></h3>

        <input id="product" placeholder="Enter Product" />
        <input id="audience" placeholder="Target Audience" />

        <select id="platform">
            <option value="instagram">Instagram</option>
            <option value="facebook ads">Facebook Ads</option>
            <option value="google ads">Google Ads</option>
            <option value="youtube shorts">YouTube Shorts</option>
            <option value="youtube long">YouTube Long</option>
            <option value="all">All Platforms</option>
        </select>

        <br>

        <button onclick="generate()">Generate</button>
        <button onclick="downloadPDF()">Download PDF</button>
        <button onclick="loadHistory()">History</button>
        <button onclick="logout()">Logout</button>

        <div id="result"></div>
        <div id="history"></div>

    </div>

</div>

<script>
let currentUser = localStorage.getItem("user");

if (currentUser) {
    showApp(currentUser);
}

// ================= LOGIN =================
async function signup() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/signup", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username, password})
    });

    alert("Signup success");
}

async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username, password})
    });

    if (res.ok) {
        localStorage.setItem("user", username);
        showApp(username);
    } else {
        alert("Invalid login");
    }
}

function logout() {
    localStorage.removeItem("user");
    location.reload();
}

function showApp(username) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("userDisplay").innerText = username;
    currentUser = username;
}

// ================= GENERATE =================
async function generate() {
    const product = document.getElementById("product").value;
    const audience = document.getElementById("audience").value;
    const platform = document.getElementById("platform").value;

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "⏳ Generating...";

    try {
        const res = await fetch("/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                username: currentUser,
                product,
                audience,
                platform
            })
        });

        const data = await res.json();
        resultDiv.innerHTML = data.campaign || "Error";

    } catch {
        resultDiv.innerHTML = "❌ Server error";
    }
}

// ================= HISTORY =================
async function loadHistory() {
    const res = await fetch(`/history/${currentUser}`);
    const data = await res.json();

    let html = "<h3>History</h3>";

    data.history.forEach(item => {
        html += `
        <div style="margin-bottom:10px;border-bottom:1px solid gray;">
            <b>${item[0]}</b> (${item[2]})
            <pre>${item[3]}</pre>
        </div>`;
    });

    document.getElementById("history").innerHTML = html;
}

// ================= PDF =================
function downloadPDF() {
    const element = document.getElementById("result");
    html2pdf().from(element).save("marketing-plan.pdf");
}
</script>

</body>
</html>
