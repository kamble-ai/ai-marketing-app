<!DOCTYPE html>
<html>
<head>
    <title>AI Marketing SaaS</title>

    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .box {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 420px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        input, select {
            width: 90%;
            padding: 12px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            font-size: 14px;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }

        button:hover {
            background: #16a34a;
        }

        #result {
            margin-top: 20px;
            white-space: pre-wrap;
            text-align: left;
            font-size: 14px;
        }
    </style>
</head>

<body>

<h1>🚀 AI Marketing Generator</h1>

<div class="box">

    <input type="text" id="product" placeholder="Enter Product" />
    <input type="text" id="audience" placeholder="Enter Target Audience" />

    <select id="platform">
        <option value="instagram">Instagram</option>
        <option value="facebook_ads">Facebook Ads</option>
        <option value="google_ads">Google Ads</option>
        <option value="youtube_short">YouTube Shorts</option>
        <option value="youtube_long">YouTube Long</option>
        <option value="all">All Platforms 🚀</option>
    </select>

    <br>

    <button onclick="generate()">Generate</button>
    <button onclick="downloadPDF()">Download PDF</button>

    <div id="result"></div>

</div>

<script>

async function generate() {
    const product = document.getElementById("product").value;
    const audience = document.getElementById("audience").value;
    const platform = document.getElementById("platform").value;

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "⏳ Generating...";

    async function callAPI(retries = 2) {
        try {
            const response = await fetch("https://ai-marketing-app-pfx2.onrender.com/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    product,
                    audience,
                    platform
                })
            });

            if (!response.ok) throw new Error();

            return await response.json();

        } catch (error) {
            if (retries > 0) {
                resultDiv.innerHTML = "⏳ Waking up server... retrying...";
                await new Promise(res => setTimeout(res, 5000));
                return callAPI(retries - 1);
            } else {
                throw error;
            }
        }
    }

    try {
        const data = await callAPI();

        if (data.campaign) {
            resultDiv.innerHTML = data.campaign;
        } else {
            resultDiv.innerHTML = "❌ " + (data.error || "Unknown error");
        }

    } catch {
        resultDiv.innerHTML = "❌ Server error. Try again.";
    }
}


function downloadPDF() {
    const element = document.getElementById("result");
    html2pdf().from(element).save("marketing-plan.pdf");
}

</script>

</body>
</html>
