<!DOCTYPE html>
<html>
<head>
<title>AI Marketing Generator</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#000,#0f172a);
    color:white;
    text-align:center;
}

.box {
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    max-width:450px;
    margin:auto;
}

input,select {
    width:90%;
    padding:10px;
    margin:10px;
}

button {
    padding:10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}

#result {
    background:#f1f5f9;
    padding:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>🚀 AI Marketing Generator</h1>

<div class="box">

<!-- SIGNUP -->
<div id="signupPage">
<h2>Signup</h2>

<input id="firstName" placeholder="First Name">
<input id="lastName" placeholder="Last Name">

<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<input id="dob" type="date">

<input id="signupUsername" placeholder="Username">
<input id="signupPassword" type="password" placeholder="Password">
<input id="confirmPassword" type="password" placeholder="Confirm Password">

<button onclick="signup()">Signup</button>

<p><a onclick="showLogin()">Already signed? Login</a></p>
</div>


<!-- LOGIN -->
<div id="loginPage" style="display:none">
<h2>Login</h2>

<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p><a onclick="showSignup()">New user? Signup</a></p>
</div>


<!-- APP -->
<div id="appPage" style="display:none">

<h3>Welcome <span id="userDisplay"></span></h3>

<input id="product" placeholder="Product">
<input id="audience" placeholder="Audience">

<select id="platform">
<option value="Instagram">Instagram</option>
<option value="Facebook Ads">Facebook Ads</option>
<option value="Google Ads">Google Ads</option>
<option value="YouTube Shorts">YouTube Shorts</option>
<option value="YouTube Long">YouTube Long</option>
<option value="all">All</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="logout()">Logout</button>

<div id="result"></div>
<div id="history"></div>

</div>

</div>

<script>

function showSignup(){
    signupPage.style.display="block";
    loginPage.style.display="none";
    appPage.style.display="none";
}

function showLogin(){
    signupPage.style.display="none";
    loginPage.style.display="block";
    appPage.style.display="none";
}

function showApp(user){
    signupPage.style.display="none";
    loginPage.style.display="none";
    appPage.style.display="block";
    userDisplay.innerText=user;
}

// SIGNUP
async function signup(){

    const res = await fetch("/signup",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            first_name:firstName.value,
            last_name:lastName.value,
            gender:gender.value,
            dob:dob.value,
            username:signupUsername.value,
            password:signupPassword.value,
            confirm_password:confirmPassword.value
        })
    });

    const d = await res.json();
    alert(d.message || d.error);

    if(d.message) showLogin();
}

// LOGIN
async function login(){

    const res = await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:loginUsername.value,
            password:loginPassword.value
        })
    });

    const d = await res.json();

    if(d.message){
        localStorage.setItem("user",loginUsername.value);
        showApp(loginUsername.value);
    } else alert(d.error);
}

// GENERATE
async function generate(){

    const res = await fetch("/generate",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:localStorage.getItem("user"),
            product:product.value,
            audience:audience.value,
            platform:platform.value
        })
    });

    const d = await res.json();
    result.innerText = d.campaign;
}

// LOGOUT
function logout(){
    localStorage.removeItem("user");
    location.reload();
}

// AUTO LOAD
window.onload = ()=>{
    const user = localStorage.getItem("user");
    if(user) showApp(user);
    else showSignup();
}

</script>

</body>
</html>
