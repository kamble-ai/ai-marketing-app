<!DOCTYPE html>
<html>
<head>
    <title>AI Marketing SaaS</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-top: 40px;
        }

        .box {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            margin: auto;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        #result {
            margin-top: 20px;
            white-space: pre-wrap;
            text-align: left;
        }
    </style>
</head>

<body>

<h1>🚀 AI Marketing SaaS</h1>

<div class="box">
    <input type="text" id="product" placeholder="Enter Product" />
    <input type="text" id="audience" placeholder="Enter Target Audience" />

    <select id="platform">
        <option>Instagram</option>
        <option>YouTube Shorts</option>
        <option>YouTube Long</option>
        <option>Facebook Ads</option>
        <option>Google Ads</option>
    </select>

    <br>

    <button onclick="generate()">Generate</button>
    <button onclick="downloadPDF()">Download PDF</button>

    <div id="result"></div>
</div>

<script>
async function generate() {
    const product = document.getElementById("product").value;
    const audience = document.getElementById("audience").value;
    const platform = document.getElementById("platform").value;

    const resultDiv = document.getElementById("result");
    resultDiv.innerHTML = "⏳ Generating...";

    try {
        const response = await fetch("https://ai-marketing-app-pfx2.onrender.com/generate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                product: product,
                audience: audience,
                platform: platform
            })
        });

        const data = await response.json();

        if (data.campaign) {
            resultDiv.innerHTML = data.campaign;
        } else {
            resultDiv.innerHTML = "❌ Error: " + data.error;
        }

    } catch (error) {
        resultDiv.innerHTML = "❌ Server Error";
    }
}

function downloadPDF() {
    const element = document.getElementById("result");
    html2pdf().from(element).save("marketing-plan.pdf");
}
</script>

</body>
</html>
